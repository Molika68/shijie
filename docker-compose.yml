services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: shijie
      POSTGRES_DB: shijie
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./shijie-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:shijie@db:5432/shijie
      - JWT_SECRET=${JWT_SECRET:-5c9d092135d2fd9ff7864043a2d7ad61dd74b50e3033299bccb13f71b2791021}
      - APP_PUBLIC_URL=${APP_PUBLIC_URL:-http://localhost:3000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:80}
      - AI_PROVIDER=${AI_PROVIDER:-dashscope}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_VISION_MODEL=${DASHSCOPE_VISION_MODEL:-qwen-vl-plus}
      - DASHSCOPE_IMAGE_MODEL=${DASHSCOPE_IMAGE_MODEL:-wan2.7-image-pro}
      - DASHSCOPE_IMAGE_SIZE=${DASHSCOPE_IMAGE_SIZE:-1K}
      - DASHSCOPE_TTS_MODEL=${DASHSCOPE_TTS_MODEL:-qwen3-tts-flash}
      - DASHSCOPE_TTS_VOICE=${DASHSCOPE_TTS_VOICE:-Cherry}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AI_DAILY_LIMIT=${AI_DAILY_LIMIT:-100}
      - UPLOAD_DIR=./uploads
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-识界 <onboarding@resend.dev>}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-shijie}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
    volumes:
      - ./shijie-backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./shijie-frontend
      dockerfile: Dockerfile
      args:
        - TARO_APP_API=${TARO_APP_API:-http://localhost:3000/api}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
